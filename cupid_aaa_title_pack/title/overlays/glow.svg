<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="none">
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="rgba(255,70,190,0.22)"/>
      <stop offset="1" stop-color="rgba(255,70,190,0)"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="rgba(255,200,0,0.14)"/>
      <stop offset="1" stop-color="rgba(255,200,0,0)"/>
    </radialGradient>
    <filter id="b"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <circle cx="340" cy="240" r="260" fill="url(#g1)" filter="url(#b)">
    <animate attributeName="cx" dur="12s" values="340;520;340" repeatCount="indefinite"/>
    <animate attributeName="cy" dur="14s" values="240;430;240" repeatCount="indefinite"/>
  </circle>
  <circle cx="1540" cy="840" r="320" fill="url(#g2)" filter="url(#b)">
    <animate attributeName="cx" dur="16s" values="1540;1320;1540" repeatCount="indefinite"/>
    <animate attributeName="cy" dur="15s" values="840;700;840" repeatCount="indefinite"/>
  </circle>
  <rect x="-700" y="0" width="700" height="1080" fill="rgba(255,255,255,0.03)">
    <animate attributeName="x" dur="6.5s" values="-700;1920" repeatCount="indefinite"/>
  </rect>
</svg>
